version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: perpdex-postgres
    environment:
      POSTGRES_USER: perpdex
      POSTGRES_PASSWORD: perpdex_password
      POSTGRES_DB: perpdex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perpdex"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - perpdex-network

  redis:
    image: redis:7-alpine
    container_name: perpdex-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - perpdex-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: perpdex-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://perpdex:perpdex_password@postgres:5432/perpdex?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-jwt-secret-change-in-production
      - PORT=3001
      - SIWE_CHAIN_ID=421614
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - perpdex-network
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: perpdex-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      api:
        condition: service_healthy
    networks:
      - perpdex-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  perpdex-network:
    driver: bridge
